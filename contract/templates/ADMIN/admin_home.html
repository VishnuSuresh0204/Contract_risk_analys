{% extends "ADMIN/base_admin.html" %}
{% block content %}
<h2 style="margin-bottom: 1.5rem;">Dashboard Overview</h2>
<div class="grid-cards">
    <div class="glass-card" style="text-align: center;">
        <h3 style="color: #94a3b8; font-size: 1rem;">Total Users</h3>
        <p style="font-size: 2.5rem; font-weight: 800; margin: 0.5rem 0;">{{ users }}</p>
    </div>
    <div class="glass-card" style="text-align: center;">
        <h3 style="color: #94a3b8; font-size: 1rem;">Total Contracts</h3>
        <p style="font-size: 2.5rem; font-weight: 800; margin: 0.5rem 0;">{{ contracts }}</p>
    </div>
    <div class="glass-card" style="text-align: center;">
        <h3 style="color: #94a3b8; font-size: 1rem;">Analyzed</h3>
        <p style="font-size: 2.5rem; font-weight: 800; margin: 0.5rem 0; color: #22c55e;">{{ analyzed }}</p>
    </div>
    <div class="glass-card" style="text-align: center;">
        <h3 style="color: #94a3b8; font-size: 1rem;">High Risk</h3>
        <p style="font-size: 2.5rem; font-weight: 800; margin: 0.5rem 0; color: #ef4444;">{{ high_risk }}</p>
    </div>
</div>
{% endblock %}
