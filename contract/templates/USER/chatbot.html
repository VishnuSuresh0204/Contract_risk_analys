{% extends "USER/base_user.html" %}
{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 0 auto; height: 70vh; display: flex; flex-direction: column;">
    <h2 style="margin-top: 0; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">
        AI Contract Assistant
    </h2>
    
    <div style="flex: 1; overflow-y: auto; padding: 1rem 0; display: flex; flex-direction: column; gap: 1rem;">
        {% for msg in val %}
            <div style="padding: 1rem; border-radius: 12px; max-width: 80%; {% if msg.sender_type == 'user' %}align-self: flex-end; background: var(--primary);{% else %}align-self: flex-start; background: rgba(255,255,255,0.1);{% endif %}">
                <p style="margin: 0;">{{ msg.message }}</p>
                <small style="opacity: 0.7; font-size: 0.7rem; display: block; margin-top: 0.5rem; text-align: right;">{{ msg.created_at|date:"H:i" }}</small>
            </div>
        {% endfor %}
    </div>
    
    <form method="POST" action="/user_send_chat_message" style="display: flex; gap: 1rem; margin-top: 1rem;">
        {% csrf_token %}
        <input type="hidden" name="conversation_id" value="{{ conversation.id }}">
        <input type="text" name="message" placeholder="Ask a question about your contract..." required style="margin: 0; flex: 1; border-radius: 20px;">
        <button type="submit" class="btn" style="border-radius: 20px; padding: 0.75rem 2rem;">Send</button>
    </form>
</div>
{% endblock %}
