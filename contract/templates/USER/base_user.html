<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --secondary: #1e293b;
            --accent: #8b5cf6;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        body { margin: 0; font-family: 'Outfit', sans-serif; background-color: var(--bg-color); background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed; color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; }
        .navbar .logo { font-size: 1.5rem; font-weight: 800; color: white; text-decoration: none; background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-weight: 600; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.3s ease; }
        .nav-links a:hover { background: rgba(255, 255, 255, 0.1); color: white; box-shadow: 0 0 10px rgba(255, 255, 255, 0.05); }
        .container { flex: 1; padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); transition: border-color 0.3s ease; }
        .glass-card:hover { border-color: rgba(255, 255, 255, 0.25); }
        .btn { background: linear-gradient(90deg, var(--primary), var(--accent)); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; text-decoration: none; display: inline-block;}
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--glass-border); }
        th { background: rgba(255,255,255,0.02); color: #94a3b8; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: white; font-family: 'Outfit', sans-serif; box-sizing: border-box; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); }
        ::placeholder { color: #94a3b8; opacity: 1; }
        select option { background: var(--secondary); color: white; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
        .badge-high { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid #ef4444; }
        .badge-medium { background: rgba(234, 179, 8, 0.2); color: #fef08a; border: 1px solid #eab308; }
        .badge-low { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid #22c55e; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/user_home" class="logo">User Dashboard</a>
        <div class="nav-links">
            <a href="/user_home">Home</a>
            <a href="/user_upload_contract">Upload</a>
            <a href="/user_view_contracts">My Contracts</a>
            <a href="/user_notifications">Notifications</a>
            <a href="/user_feedback">Feedback</a>
            <a href="/user_complaints">Complaints</a>
            <a href="/signout" style="color: #fca5a5; margin-left: 1rem;">Logout</a>
        </div>
    </nav>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div style="padding: 1rem; border-radius: 8px; margin-bottom: 1rem; background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #86efac;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
